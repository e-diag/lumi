# CI: go test / vet → Docker → (опционально) выкат на сервер по SSH.
# PR: только проверки и сборка образа без push.
# main / v*: push в GHCR; деплой — если заданы secrets (или вручную с флагом deploy).
name: CI / CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: "После сборки выкатить на сервер (нужны DEPLOY_* secrets)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go (vet, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Verify modules
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1

      - name: Build all commands
        run: |
          set -e
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o /tmp/api ./cmd/api
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o /tmp/bot ./cmd/bot
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o /tmp/web ./cmd/web
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o /tmp/migrator ./cmd/migrator

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: go
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: docker
    # Только после успешных тестов (go) и пуша образа (не PR). Ручной выкат — только с main или тега v*.
    if: |
      needs.go.result == 'success' &&
      needs.docker.result == 'success' &&
      github.event_name != 'pull_request' &&
      secrets.DEPLOY_HOST != '' &&
      (
        (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))) ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))
      )
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USER: ${{ secrets.DEPLOY_GHCR_USER }}
          GHCR_TOKEN: ${{ secrets.DEPLOY_GHCR_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_PATH,GHCR_USER,GHCR_TOKEN
          script_stop: true
          script: |
            set -euo pipefail
            if [ -z "${DEPLOY_PATH:-}" ]; then
              echo "DEPLOY_PATH is empty"
              exit 1
            fi
            cd "$DEPLOY_PATH"
            if [ -n "${GHCR_TOKEN:-}" ] && [ -n "${GHCR_USER:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            fi
            docker compose pull
            docker compose up -d --remove-orphans
