# CI/CD: go (vet, test, govulncheck) → Docker → SSH deploy → внешняя проверка health.
#
# Версии actions зафиксированы по major (v4/v5/v6). Для максимальной воспроизводимости
# можно перейти на полный SHA коммита (см. docs/CI_CD_HARDENING_REPORT.md).
name: CI / CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: "После сборки выкатить на сервер (нужны DEPLOY_* secrets)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go (govulncheck, vet, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Verify modules
        run: go mod verify

      - name: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1

      - name: Build all commands
        run: |
          set -e
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o /tmp/api ./cmd/api
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o /tmp/bot ./cmd/bot
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o /tmp/web ./cmd/web
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o /tmp/migrator ./cmd/migrator

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: go
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: [go, docker]
    # Условие без обращения к контексту секретов (см. шаг deploy_gate). Многострочный if ломает часть YAML-схем IDE.
    if: ${{ needs.go.result == 'success' && needs.docker.result == 'success' && github.event_name != 'pull_request' && ((github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))) || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))) }}
    # Опционально: раскомментируйте, если в репозитории создано окружение (Settings → Environments).
    # environment:
    #   name: production
    permissions:
      contents: read
    steps:
      - name: Check deploy secrets
        id: deploy_gate
        env:
          DEPLOY_HOST_CHECK: ${{ secrets.DEPLOY_HOST }}
        run: |
          if [ -n "$DEPLOY_HOST_CHECK" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DEPLOY_HOST не задан — SSH-деплой пропущен (добавьте секреты в репозитории)."
          fi

      - name: Deploy over SSH
        if: steps.deploy_gate.outputs.ok == 'true'
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USER: ${{ secrets.DEPLOY_GHCR_USER }}
          GHCR_TOKEN: ${{ secrets.DEPLOY_GHCR_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 30m
          envs: DEPLOY_PATH,GHCR_USER,GHCR_TOKEN
          script_stop: true
          script: |
            set -euo pipefail
            log() { echo "[deploy] $*"; }
            if [ -z "${DEPLOY_PATH:-}" ]; then
              log "ERROR: DEPLOY_PATH is empty"
              exit 1
            fi
            cd "$DEPLOY_PATH"
            log "working directory: $(pwd)"
            if [ -n "${GHCR_TOKEN:-}" ] && [ -n "${GHCR_USER:-}" ]; then
              log "logging in to ghcr.io"
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            else
              log "WARN: GHCR credentials not passed; assuming docker is already logged in to ghcr.io"
            fi
            log "docker compose pull"
            docker compose pull
            log "running schema migration (same image as api: /app/migrator)"
            docker compose run --rm api /app/migrator
            log "docker compose up -d --remove-orphans"
            docker compose up -d --remove-orphans
            log "running containers:"
            docker compose ps
            log "finished successfully"

      - name: Verify public health endpoints
        if: steps.deploy_gate.outputs.ok == 'true'
        env:
          API_READY_URL: ${{ secrets.DEPLOY_HEALTH_API_READY_URL }}
          WEB_HEALTH_URL: ${{ secrets.DEPLOY_HEALTH_WEB_URL }}
        run: |
          set -euo pipefail
          if [ -z "${API_READY_URL:-}" ]; then
            echo "::warning::DEPLOY_HEALTH_API_READY_URL is not set — skipping external health check (рекомендуется для прода: полный URL, например https://api.example.com/health/ready)"
            exit 0
          fi
          echo "[health] GET $API_READY_URL"
          curl -fsS --max-time 30 --retry 8 --retry-delay 5 --retry-all-errors "$API_READY_URL"
          if [ -n "${WEB_HEALTH_URL:-}" ]; then
            echo "[health] GET $WEB_HEALTH_URL"
            curl -fsS --max-time 30 --retry 8 --retry-delay 5 --retry-all-errors "$WEB_HEALTH_URL"
          else
            echo "[health] DEPLOY_HEALTH_WEB_URL not set — skipping web check"
          fi
          echo "[health] OK"
