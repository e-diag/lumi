server:
  host: "0.0.0.0"
  port: 8080
  base_url: "${BASE_URL}"

database:
  dsn: "${DATABASE_DSN}"

jwt:
  secret: "${JWT_SECRET}"

bot:
  token: "${TELEGRAM_BOT_TOKEN}"
  admin_ids: [${TELEGRAM_ADMIN_IDS}]
  username: "${TELEGRAM_BOT_USERNAME}"
  app_url_ios: "${TELEGRAM_APP_URL_IOS}"
  app_url_android: "${TELEGRAM_APP_URL_ANDROID}"
  payment_default_days: 30
  max_trials_per_ip: 3
  referral_bonus_max_per_month: 30
  support_url: "${TELEGRAM_SUPPORT_URL}"
  trial_global_cap_per_24h: 0

web:
  host: "0.0.0.0"
  port: 3000
  admin_token: "${ADMIN_WEB_TOKEN}"

xui:
  base_url: "${XUI_BASE_URL}"
  username: "${XUI_USERNAME}"
  password: "${XUI_PASSWORD}"
  inbound_id: 1
  public_subscription_base_url: "${XUI_PUBLIC_SUBSCRIPTION_BASE_URL}"
  subscription_path: "${XUI_SUBSCRIPTION_PATH}"

yookassa:
  shop_id: "${YOOKASSA_SHOP_ID}"
  secret_key: "${YOOKASSA_SECRET_KEY}"
