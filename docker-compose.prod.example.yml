# Пример продакшен-стека: образ из GHCR (после CI), без build на сервере.
# Скопируйте рядом с .env, подставьте ghcr.io/<owner>/<repo>:latest и запускайте из каталога DEPLOY_PATH.
#
# Перед первым up: docker compose -f docker-compose.prod.example.yml pull
# Миграция схемы (тот же образ, что api): 
#   docker compose -f docker-compose.prod.example.yml run --rm api /app/migrator
# Затем: docker compose -f docker-compose.prod.example.yml up -d
#
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: freeway
      POSTGRES_USER: freeway
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # В продакшене не публикуйте порт PostgreSQL наружу: доступ только из сети compose.
    # Для ад-hoc psql с хоста временно добавьте ports: ["127.0.0.1:5432:5432"].
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freeway"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/OWNER/REPO:latest
    pull_policy: always
    command: /app/api
    env_file: .env
    environment:
      CONFIG_PATH: /app/config.yaml
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  bot:
    image: ghcr.io/OWNER/REPO:latest
    pull_policy: always
    command: /app/bot
    env_file: .env
    environment:
      CONFIG_PATH: /app/config.yaml
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped

  web:
    image: ghcr.io/OWNER/REPO:latest
    pull_policy: always
    command: /app/web
    env_file: .env
    environment:
      CONFIG_PATH: /app/config.yaml
      WEB_TEMPLATE_DIR: /app/internal/handler/web/templates
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
