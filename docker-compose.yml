version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: freeway
      POSTGRES_USER: freeway
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freeway"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: /app/api
    env_file: .env
    environment:
      CONFIG_PATH: /app/config.yaml
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  bot:
    build: .
    command: /app/bot
    env_file: .env
    environment:
      CONFIG_PATH: /app/config.yaml
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["phase3"]  # включается только в Фазе 3

  web:
    build: .
    command: /app/web
    env_file: .env
    environment:
      CONFIG_PATH: /app/config.yaml
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["phase3"]  # включается только в Фазе 3

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@freeway-vpn.ru
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles: ["dev"]  # только для разработки

volumes:
  postgres_data:
