services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: freeway
      POSTGRES_USER: freeway
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Локальная разработка: порт наружу удобен для GUI-клиентов. В продакшене см. docker-compose.prod.example.yml (без publish).
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freeway"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: /app/api
    env_file: .env
    environment:
      CONFIG_PATH: /app/config.yaml
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  bot:
    build: .
    command: /app/bot
    env_file: .env
    environment:
      CONFIG_PATH: /app/config.yaml
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped

  # Одноразовый прогон схемы БД: docker compose --profile tools run --rm migrator
  migrator:
    profiles: [tools]
    build: .
    command: /app/migrator
    env_file: .env
    environment:
      CONFIG_PATH: /app/config.yaml
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build: .
    command: /app/web
    env_file: .env
    environment:
      CONFIG_PATH: /app/config.yaml
      WEB_TEMPLATE_DIR: /app/internal/handler/web/templates
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@freeway-vpn.ru
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles: ["dev"]

volumes:
  postgres_data:
